<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poga Play Store</title>
    <style>
        body {
            background-color: black;
            color: #00FF00;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            border-bottom: 2px solid #00FF00;
            padding-bottom: 10px;
        }
        .app-list {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .app-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border: 1px solid #00FF00;
            border-radius: 10px;
        }
        .app-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .app-icon {
            width: 55px;
            height: 55px;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            background-color: #333;
        }
        .app-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
        }
        .download-btn {
            background-color: #00FF00;
            color: black;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>Welcome to Poga Play Store</h1>

    <div class="app-list">
        
        <div class="app-item">
            <div class="app-info">
                <div class="app-icon" style="background-image: url('pogablockjpg');"></div>
                <span class="app-name">Pogablock.apk</span>
            </div>
            <!-- यहाँ आपका नया डायरेक्ट डाउनलोड लिंक है -->
            <a href="https://drive.google.com/uc?export=download&id=10Q8EgcTkJojkOdMDQucGEvIqinMXo22l" class="download-btn">Download</a>
        </div>

    </div>

</body>
</html>
