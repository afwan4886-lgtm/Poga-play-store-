<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poga Play Store</title>
    <style>
        body {
            background-color: black;
            color: #00FF00;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            border-bottom: 2px solid #00FF00;
            padding-bottom: 20px;
        }
        .app-list {
            margin-top: 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .app-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border: 1px solid #00FF00;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .app-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .app-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #222;
        }
        .app-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
        }
        .download-btn {
            background-color: #00FF00;
            color: black;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>Welcome to Poga Play Store</h1>

    <div class="app-list">
        <div class="app-item">
            <div class="app-info">
                <div class="app-icon"style="background-image:url('public/wideochat.jpeg');"></div>

                <span class="app-name">Pogablock.apk</span>
            </div>
            <a href="https://github.com/afwan4886-lgtm/Poga-apps/releases/download/V1.0/app-release.apk" class="download-btn" download>Download</a>
        </div>

        <div class="app-item">
            <div class="app-info">
                <div class="app-icon" style="background-image: url('public/wideochat.jpeg');"></div>
                <span class="app-name">Poga Video Chat</span>
            </div>
            <a href="https://github.com/afwan4886-lgtm/Poga-play-store-/releases/download/v1.2/app-release.apk" class="download-btn" download>Download</a>
        </div>
        
        <div class="app-item">
            <div class="app-info">
                <div class="app-icon" style="background-image: url('public/pogapop.jpeg');"></div>
                <span class="app-name">Poga Pop</span>
            </div>
            <a href="https://github.com/afwan4886-lgtm/Poga-apps/releases/download/v1.3/app-release.apk" class="download-btn" download>Download</a>
        </div>
    </div>

</body>
</html>
